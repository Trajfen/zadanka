<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Wojciech Roszak">
    <title>Lekcja 18a</title>
</head>
<style>
    main {
        display: grid;
        grid-template-columns: auto auto auto auto;
        width: 400px;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
    }
    .sq{
        height: 100px;
        width: 100px;
        margin: 2px;
        border: 4px solid black;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    #sq1{
        background-color: #C0C0C0;
    }
    #sq2{
        background-color: #808080;
        color: white;
    }
    #sq3{
        background-color: #800000;
        color: white;
    }
    #sq4{
        background-color: #008000;
        color: white;
    }
    #sq5{
        background-color: #FFFFFF;
    }
    #sq6{
        background-color: #000000;
    }
    #sq7{
        background-color: #FF0000;
    }
    #sq8{
        background-color: #00FF00;
    }
    #sq9{
        background-color: #000080;
        color: white;
    }
    #sq10{
        background-color: #800080;
        color: white;
    }
    #sq11{
        background-color: #808000;
        color: white;
    }
    #sq12{
        background-color: #008080;
        color: white;
    }
    #sq13{
        background-color: #0000FF;
        color: white;
    }
    #sq14{
        background-color: #FF00FF;
        border: 4px dotted white;
        color: white;
    }
    #sq15{
        background-color: #FFFF00;
    }
    #sq16{
        background-color: #00FFFF;
    }

</style>
<body>
    <main>
        <section class="sq" id="sq1"><a>silver<br>C0C0C0</a></section>
        <section class="sq" id="sq2"><a>gray<br>808080</a></section>
        <section class="sq" id="sq3"><a>maroon<br>8000000</a></section>
        <section class="sq" id="sq4"><a>green<br>008000</a></section>
        <section class="sq" id="sq5"><a>white<br>FFFFFF</a></section>
        <section class="sq" id="sq6"><a>black<br>000000</a></section>
        <section class="sq" id="sq7"><a>red<br>FF0000</a></section>
        <section class="sq" id="sq8"><a>lime<br>00FF00</a></section>
        <section class="sq" id="sq9"><a>navy<br>000080</a></section>
        <section class="sq" id="sq10"><a>purple<br>800080</a></section>
        <section class="sq" id="sq11"><a>olive<br>808000</a></section>
        <section class="sq" id="sq12"><a>teal<br>008080</a></section>
        <section class="sq" id="sq13"><a>blue<br>0000FF</a></section>
        <section class="sq" id="sq14"><a>magenta<br>FF00FF</a></section>
        <section class="sq" id="sq15"><a>yellow<br>FFFF00</a></section>
        <section class="sq" id="sq16"><a>cyan<br>00FFFF</a></section>
    </main>
</body>
</html>
