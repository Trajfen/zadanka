<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kurs rysowania zębatek</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background:#5fa0c8;
}

.container{
    width:900px;
    margin:40px auto;
    border:5px solid white;
}

header{
    background:#4a5a84;
    color:#e6e59c;
    text-align:center;
    padding:15px;
    font-size:28px;
    font-weight:bold;
    letter-spacing:2px;
}

main{
    display:flex;
}

.left{
    width:40%;
    background:linear-gradient(#6da8d0,#5fa0c8);
    padding:40px;
    color:white;
}
.left ul{
    list-style-type: circle;
    color:white;
}

.left h2{
    font-weight:normal;
}

.right{
    width:60%;
    background:#7fb2d3;
    display:flex;
    justify-content:center;
    align-items:center;
}

.image-box{
    background:#e5e5e5;
    padding:30px;
}

footer{
    background:#4a5a84;
    color:#e6e59c;
    text-align:right;
    padding:10px 20px;
}

</style>
</head>

<body>

<div class="container">

<header>
KURS RYSOWANIA ZĘBATEK
</header>

<main>

<div class="left">
<h2>Lista użytych kolorów:</h2>

<ul>
<li>Biały</li>
<li>Czarny</li>
<li>Szary</li>
<li>Brązowy</li>
<li>Żółty</li>
</ul>

</div>

<div class="right">

<div class="image-box">
<img src="zebatki.png" width="300">
</div>

</div>

</main>

<footer>
AUTOR : WOJCIECH ROSZAK
</footer>

</div>

</body>
</html>
